site_name: pycubrid
site_description: Pure Python DB-API 2.0 driver for CUBRID database
site_author: cubrid-labs
site_url: https://cubrid-labs.github.io/pycubrid/
repo_url: https://github.com/cubrid-labs/pycubrid
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: quickstart.md
      - Connection Guide: CONNECTION.md
      - Examples: EXAMPLES.md
  - Reference:
      - API Reference: API_REFERENCE.md
      - Type Mapping: TYPES.md
      - Protocol: PROTOCOL.md
  - Architecture: ARCHITECTURE.md
  - Operations:
      - Performance: PERFORMANCE.md
      - Support Matrix: SUPPORT_MATRIX.md
      - Troubleshooting: TROUBLESHOOTING.md
  - Development: DEVELOPMENT.md
  - FAQ: faq.md
  - Changelog: https://github.com/cubrid-labs/pycubrid/blob/main/CHANGELOG.md
  - Contributing: https://github.com/cubrid-labs/pycubrid/blob/main/CONTRIBUTING.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cubrid-labs/pycubrid
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pycubrid/

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
